# Silicon dioxide (thermal SiO2) material parameters - OpenTCAD
# Insulator: only permittivity matters for Poisson-only regions.

material: SiO2
symbol: SiO2
is_insulator: true

permittivity_relative: 3.9   # Ref: Sze & Ng (2007) - thermal oxide

bandgap:
  Eg_eV_300K: 9.0            # [eV] wide-gap insulator. Ref: DiMaria (1995)

electron_affinity_eV: 0.95   # [eV] Si/SiO2 conduction band offset 3.1 eV
Nc_cm3_300K: 1.0e19          # nominal - no carrier transport here
Nv_cm3_300K: 1.0e19
ni_cm3_300K: 1.0e-20         # effectively zero

# Carriers are not solved in SiO2; these fields are unused but kept for
# schema compatibility.
mobility_constant:
  electron_cm2_Vs: 20.0      # SiO2 mobility - tunneling/SILC regime only
  hole_cm2_Vs: 1.0

recombination:
  tau_n_s: 1.0e-12
  tau_p_s: 1.0e-12
